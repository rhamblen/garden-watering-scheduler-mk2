            tmr: "timer.{{ states('input_text.garden_b_valve_4_entity').split('.')[1] }}_timer"
            secs: "{{ states('input_number.garden_b_valve_4_duration') | int(0) * 60 }}"
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.garden_b_run_end
          data:
            timestamp: >-
              {% set ns = namespace(s=0) %}
              {% for n in [4,5] %}
                {% set d = states('input_number.garden_b_valve_' ~ n ~ '_duration')|int(0) %}
                {% if d > 0 %}{% set ns.s = ns.s + d*60 %}{% endif %}
              {% endfor %}
              {{ (now().timestamp()|int) + ns.s }}
        - action: homeassistant.turn_on
          data:
            entity_id: "{{ sw }}"
        - action: timer.start
          target:
            entity_id: "{{ tmr }}"
          data:
            duration: "{{ '%02d:%02d:%02d' % (secs // 3600, (secs % 3600) // 60, secs % 60) }}"
        - wait_template: "{{ is_state(sw,'on') }}"
          timeout: "30"
          continue_on_timeout: true
        - wait_template: "{{ is_state(sw,'off') }}"
          timeout: "{{ secs + 30 }}"
          continue_on_timeout: true
        - if:
            - condition: template
              value_template: "{{ is_state(sw,'on') }}"
          then:
            - action: homeassistant.turn_off
              data:
                entity_id: "{{ sw }}"
            - action: timer.cancel
              target:
                entity_id: "{{ tmr }}"
            - wait_template: "{{ is_state(sw,'off') }}"
              timeout: "15"
              continue_on_timeout: true

    # ----- SLOT 5 -----
    - if:
        - condition: numeric_state
          entity_id: input_number.garden_b_valve_5_duration
          above: 0
        - condition: template
          value_template: >-
            {% set busy = namespace(any=false) %}
            {% for nsp in ['a','b'] %}{% for n in [1,2,3,4,5] %}
              {% set e = states('input_text.garden_' ~ nsp ~ '_valve_' ~ n ~ '_entity') %}
              {% if e not in ['','unknown','unavailable'] and is_state(e,'on') %}{% set busy.any = true %}{% endif %}
            {% endfor %}{% endfor %}
            {{ not busy.any }}
      then:
        - variables:
            sw: "{{ states('input_text.garden_b_valve_5_entity') }}"
            tmr: "timer.{{ states('input_text.garden_b_valve_5_entity').split('.')[1] }}_timer"
            secs: "{{ states('input_number.garden_b_valve_5_duration') | int(0) * 60 }}"
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.garden_b_run_end
          data:
            timestamp: >-
              {% set ns = namespace(s=0) %}
              {% for n in [5] %}
                {% set d = states('input_number.garden_b_valve_' ~ n ~ '_duration')|int(0) %}
                {% if d > 0 %}{% set ns.s = ns.s + d*60 %}{% endif %}
              {% endfor %}
              {{ (now().timestamp()|int) + ns.s }}
        - action: homeassistant.turn_on
          data:
            entity_id: "{{ sw }}"
        - action: timer.start
          target:
            entity_id: "{{ tmr }}"
          data:
            duration: "{{ '%02d:%02d:%02d' % (secs // 3600, (secs % 3600) // 60, secs % 60) }}"
        - wait_template: "{{ is_state(sw,'on') }}"
          timeout: "30"
          continue_on_timeout: true
        - wait_template: "{{ is_state(sw,'off') }}"
          timeout: "{{ secs + 30 }}"
          continue_on_timeout: true
        - if:
            - condition: template
              value_template: "{{ is_state(sw,'on') }}"
          then:
            - action: homeassistant.turn_off
              data:
                entity_id: "{{ sw }}"
            - action: timer.cancel
              target:
                entity_id: "{{ tmr }}"
            - wait_template: "{{ is_state(sw,'off') }}"
              timeout: "15"
              continue_on_timeout: true
