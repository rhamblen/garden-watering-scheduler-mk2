# Garden Watering Scheduler — Dashboard Card — SCHEDULE A (garden_a_* namespace)
# Repository: https://github.com/rhamblen/garden-watering-scheduler-mk2
# Requires: custom:html-template-card (HACS)
#
# This is the current card. Create the helpers in INSTALLATION.md first.
# Header controls: Play (start now) | Stop (halt + close valves) | Winterise | Rain | status badge
#
# HELPERS REQUIRED (see INSTALLATION.md):
#   Day toggles:   input_boolean.garden_a_water_mon / _tue / _wed / _thu / _fri / _sat / _sun
#   Start time:    input_select.garden_a_water_start_time   (48 options "00:00".."23:30")
#   Valve slots 1-5 (fill only what you use; blank entity = ignored):
#     input_text.garden_a_valve_N_entity      - valve switch entity id
#     input_text.garden_a_valve_N_name        - zone display name
#     input_number.garden_a_valve_N_duration  - 0..60 step 5 (0 = off)
#   State flags:   input_boolean.garden_a_schedule_armed / garden_winter_shutdown / garden_rain_cancel
#   Rain (auto):   input_number.garden_rain_threshold (0..100), input_datetime.garden_last_rain
#   Run timer:     input_datetime.garden_a_run_end       (re-stamped each zone; powers the self-correcting countdown)
#   Scripts:       script.garden_a_watering_sequence

type: custom:html-template-card
ignore_line_breaks: true
content: |
  {% set armed   = is_state('input_boolean.garden_a_schedule_armed','on') %} {% set winter  = is_state('input_boolean.garden_winter_shutdown','on') %} {% set rain    = is_state('input_boolean.garden_rain_cancel','on') %} {% set start_t = states('input_select.garden_a_water_start_time') %} {% set countdown = '' %} {% set vns = namespace(valves=[], total_d=0, parts=[]) %} {% for si in [1,2,3,4,5] %}{% set _ve = states('input_text.garden_a_valve_' + si|string + '_entity') %}{% set _vn = states('input_text.garden_a_valve_' + si|string + '_name') %}{% set _vd = states('input_number.garden_a_valve_' + si|string + '_duration')|int(0) %}{% if _ve not in ['','unknown','unavailable'] %}{% set vns.valves = vns.valves + [{'slot': si, 'entity': _ve, 'name': _vn, 'duration': _vd}] %}{% if _vd > 0 %}{% set vns.total_d = vns.total_d + _vd %}{% set vns.parts = vns.parts + [_vd|string] %}{% endif %}{% endif %}{% endfor %} {% set total_d = vns.total_d %} {% set mon = is_state('input_boolean.garden_a_water_mon','on') %} {% set tue = is_state('input_boolean.garden_a_water_tue','on') %} {% set wed = is_state('input_boolean.garden_a_water_wed','on') %} {% set thu = is_state('input_boolean.garden_a_water_thu','on') %} {% set fri = is_state('input_boolean.garden_a_water_fri','on') %} {% set sat = is_state('input_boolean.garden_a_water_sat','on') %} {% set sun = is_state('input_boolean.garden_a_water_sun','on') %} {% set dl = [mon,tue,wed,thu,fri,sat,sun] %} {% set any_day = dl|select('equalto',true)|list|length > 0 %} {% set today  = now().weekday() %} {% set _h=now().hour %}{% set _m=now().minute %}{% set cur_hm=('' if _h > 9 else '0')+_h|string+':'+('' if _m > 9 else '0')+_m|string %} {% set dnames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'] %} {% set mnames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'] %} {% set ns = namespace(off=-1) %} {% if dl[today] and cur_hm < start_t %}
    {% set ns.off = 0 %}
  {% else %}
    {% for i in range(1,8) %}{% if ns.off == -1 and dl[today+i if today+i < 7 else today+i-7] %}{% set ns.off = i %}{% endif %}{% endfor %}
  {% endif %} {% if ns.off >= 0 and any_day %}
    {% set ndt = now() + timedelta(days=ns.off) %} {% set sh = start_t[0:2]|int(6) %} {% set sm = start_t[3:5]|int(0) %} {% set rem_min = (ns.off*1440 + sh*60 + sm) - (now().hour*60 + now().minute) %} {% set cd_d = (rem_min // 1440)|int %} {% set rem_hm = rem_min - cd_d*1440 %} {% set cd_h = (rem_hm // 60)|int %} {% set cd_m = (rem_hm - cd_h*60)|int %} {% set countdown = ('in ' + cd_d|string + 'd ' + cd_h|string + 'h ' + cd_m|string + 'm') if cd_d > 0 else ('in ' + cd_h|string + 'h ' + cd_m|string + 'm') %}
    {% set next_run = dnames[ndt.weekday()] + ' ' + ndt.day|string + ' ' + mnames[ndt.month-1] + ' — ' + start_t %}
  {% else %}
    {% set next_run = 'No days selected' %}
  {% endif %} {% set ns2 = namespace(roff=-1) %} {% for i in range(1,8) %}{% if ns2.roff == -1 and dl[today+i if today+i < 7 else today+i-7] %}{% set ns2.roff = i %}{% endif %}{% endfor %} {% if ns2.roff >= 0 and any_day %}
    {% set rdt = now() + timedelta(days=ns2.roff) %}
    {% set next_after = dnames[rdt.weekday()] + ' ' + rdt.day|string + ' ' + mnames[rdt.month-1] + ' — ' + start_t %}
  {% else %}
    {% set next_after = next_run %}
  {% endif %} {% set badge = 'Winterised' if winter else ('Rain skip' if (rain and armed) else ('Armed' if armed else 'Disarmed')) %} {% set badge_c = 'gws-bwinter' if winter else ('gws-brain' if (rain and armed) else ('gws-barmed' if armed else 'gws-bdisarm')) %} {% set seq_on  = is_state('script.garden_a_watering_sequence','on') %} {% set end_ts = state_attr('input_datetime.garden_a_run_end','timestamp')|int(0) %} {% set rem_s = (end_ts - now()|as_timestamp) if end_ts else 0 %} {% set rem_s = 0 if rem_s < 0 else rem_s %} {% set rmm = (rem_s // 60)|int %} {% set rss = (rem_s - rmm*60)|int %} {% set _nm = now().minute + 1 %} {% set next_min = _nm if _nm < 60 else 0 %} {% set _nhr = now().hour + (1 if _nm >= 60 else 0) %} {% set next_hr = _nhr if _nhr < 24 else 0 %} <style> .gws{padding:12px;font-family:var(--primary-font-family);color:var(--primary-text-color)} .gws-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px} .gws-ttl{font-size:.75em;font-weight:600;color:var(--secondary-text-color);letter-spacing:.07em;text-transform:uppercase} .gws-hr{display:flex;align-items:center;gap:6px} .gws-rb{width:26px;height:26px;border-radius:6px;border:1px solid rgba(120,120,120,.2);background:rgba(120,120,120,.08);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;transition:all .2s} .gws-rb-on{background:rgba(33,150,243,.12);border-color:rgba(33,150,243,.4)} .gws-badge{font-size:.72em;font-weight:600;padding:2px 8px;border-radius:10px} .gws-barmed{background:rgba(29,158,117,.15);color:#0f6e56;border:1px solid rgba(29,158,117,.35)} .gws-bdisarm{background:rgba(120,120,120,.1);color:var(--secondary-text-color);border:1px solid rgba(120,120,120,.2)} .gws-bwinter{background:rgba(33,150,243,.12);color:#185fa5;border:1px solid rgba(33,150,243,.3)} .gws-brain{background:rgba(33,150,243,.12);color:#185fa5;border:1px solid rgba(33,150,243,.3)} .gws-sl{font-size:.72em;color:var(--secondary-text-color);margin-bottom:5px;font-weight:600} .gws-days{display:flex;gap:4px;margin-bottom:12px} .gws-day{flex:1;height:28px;border-radius:6px;border:1px solid rgba(120,120,120,.2);background:rgba(120,120,120,.08);color:var(--secondary-text-color);font-size:.75em;font-weight:600;cursor:pointer;padding:0;transition:all .15s} .gws-don{background:rgba(29,158,117,.15);color:#0f6e56;border-color:rgba(29,158,117,.4)} .gws-ddim{opacity:.35;pointer-events:none} .gws-mid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px} .gws-ctl{background:rgba(120,120,120,.06);border:1px solid rgba(120,120,120,.1);border-radius:8px;padding:7px 9px} .gws-stp{display:flex;align-items:center;justify-content:space-between} .gws-sb{width:20px;height:20px;border-radius:4px;border:1px solid rgba(120,120,120,.2);background:var(--card-background-color,#fff);color:var(--primary-text-color);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1} .gws-sv{font-size:.88em;font-weight:600} .gws-drow{margin-bottom:12px} .gws-zone{display:flex;align-items:center;margin-bottom:6px;gap:7px} .gws-zn{font-size:.72em;color:var(--secondary-text-color);width:62px;flex-shrink:0} .gws-dots{display:flex;gap:4px;flex:1} .gws-dot{width:17px;height:17px;border-radius:50px;border:1px solid rgba(120,120,120,.2);background:rgba(120,120,120,.08);cursor:pointer;transition:all .15s;display:inline-block} .gws-don2{background:#1565c0;border-color:#0d47a1} .gws-don-x{background:#c0392b;border-color:#922b21} .gws-dl{font-size:.7em;color:var(--secondary-text-color);width:40px;text-align:right;flex-shrink:0} .gws-bgo{width:100%;height:32px;border-radius:7px;border:1px solid #1d9e75;background:rgba(29,158,117,.15);color:#0f6e56;font-size:.8em;font-weight:600;cursor:pointer;margin-bottom:10px} .gws-bgo-dim{opacity:.35;cursor:default;background:rgba(120,120,120,.08);border-color:rgba(120,120,120,.2);color:var(--secondary-text-color)} .gws-div{border:none;border-top:1px solid rgba(120,120,120,.1);margin:8px 0} .gws-stat{border-radius:7px;padding:8px 10px;background:rgba(120,120,120,.06)} .gws-stl{font-size:.65em;color:var(--secondary-text-color);margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.06em} .gws-stv{font-size:.85em;font-weight:600} .gws-skip{text-decoration:line-through;color:var(--secondary-text-color)} .gws-skipn{font-size:.75em;color:#185fa5;margin-top:3px} .gws-ntc{border-radius:7px;padding:7px 10px;margin-top:7px;font-size:.75em;line-height:1.4} .gws-ntcr{background:rgba(33,150,243,.07);border:1px solid rgba(33,150,243,.2);color:#0c447c} .gws-ntcw{background:rgba(33,150,243,.07);border:1px solid rgba(33,150,243,.2);color:#0c447c} </style> <div class="gws"> <div class="gws-hdr"> <span class="gws-ttl">Garden watering (A)</span> <div class="gws-hr"> <button class="gws-rb{{ ' gws-rb-on' if seq_on else '' }}" onclick="(function(){var h=document.querySelector('home-assistant');if(!h||!h.hass||{{ 'true' if winter or seq_on else 'false' }})return;h.hass.callService('script','turn_on',{entity_id:'script.garden_a_watering_sequence'});})()">&#9654;</button> <button class="gws-rb" onclick="(function(){var h=document.querySelector('home-assistant');if(!h||!h.hass)return;h.hass.callService('script','turn_off',{entity_id:'script.garden_a_watering_sequence'});{% for valve in vns.valves %}h.hass.callService('homeassistant','turn_off',{entity_id:'{{ valve.entity }}'});{% endfor %}h.hass.callService('input_boolean','turn_off',{entity_id:'input_boolean.garden_a_schedule_armed'});h.hass.callService('input_boolean','turn_off',{entity_id:'input_boolean.garden_winter_shutdown'});})()">&#9632;</button> <button class="gws-rb{{ ' gws-rb-on' if winter else '' }}" onclick="(function(){var h=document.querySelector('home-assistant');if(!h||!h.hass)return;h.hass.callService('input_boolean','{{ 'turn_off' if winter else 'turn_on' }}',{entity_id:'input_boolean.garden_winter_shutdown'});if(!{{ 'true' if winter else 'false' }})h.hass.callService('input_boolean','turn_off',{entity_id:'input_boolean.garden_a_schedule_armed'});})()">&#10052;</button> <button class="gws-rb{{ ' gws-rb-on' if rain else '' }}" onclick="(function(){var h=document.querySelector('home-assistant');if(!h||!h.hass)return;h.hass.callService('input_boolean','{{ 'turn_off' if rain else 'turn_on' }}',{entity_id:'input_boolean.garden_rain_cancel'});})()">🌧</button> <span class="gws-badge {{ badge_c }}">{{ badge }}</span> </div> </div> <div class="gws-sl">Days</div> <div class="gws-days"> {% set defs=[('M',mon,'input_boolean.garden_a_water_mon'),('T',tue,'input_boolean.garden_a_water_tue'),('W',wed,'input_boolean.garden_a_water_wed'),('T',thu,'input_boolean.garden_a_water_thu'),('F',fri,'input_boolean.garden_a_water_fri'),('S',sat,'input_boolean.garden_a_water_sat'),('S',sun,'input_boolean.garden_a_water_sun')] %} {% for lbl,st,eid in defs %}<button class="gws-day{{ ' gws-don' if st else '' }}{{ ' gws-ddim' if winter else '' }}" onclick="(function(){var h=document.querySelector('home-assistant');if(!h||!h.hass)return;h.hass.callService('input_boolean','{{ 'turn_off' if st else 'turn_on' }}',{entity_id:'{{ eid }}'});})()">{{ lbl }}</button>{% endfor %} </div> <div class="gws-mid"> <div class="gws-ctl"> <div class="gws-sl">Start time</div> <div class="gws-stp"> <button class="gws-sb" onclick="(function(){var h=document.querySelector('home-assistant');if(!h||!h.hass)return;h.hass.callService('input_select','select_previous',{entity_id:'input_select.garden_a_water_start_time'});})()">&#8249;</button> <span class="gws-sv">{{ start_t }}</span> <button class="gws-sb" onclick="(function(){var h=document.querySelector('home-assistant');if(!h||!h.hass)return;h.hass.callService('input_select','select_next',{entity_id:'input_select.garden_a_water_start_time'});})()">&#8250;</button> </div> </div> <div class="gws-ctl"> <div class="gws-sl">Total run</div> <div style="text-align:center;padding-top:2px"> <span class="gws-sv">{{ total_d }} min</span> <div style="font-size:.7em;color:var(--secondary-text-color);margin-top:2px">{{ vns.parts|join('+') if vns.parts|length > 1 else ('1 zone' if vns.parts|length == 1 else '—') }}</div> </div> </div> </div> <div class="gws-sl">Zone duration</div> <div class="gws-drow"> {% for valve in vns.valves %}<div class="gws-zone"><span class="gws-zn">{{ valve.name }}</span><div class="gws-dots"><span class="gws-dot{{ ' gws-don-x' if valve.duration==0 else '' }}" onclick="(function(){var h=document.querySelector('home-assistant');if(!h||!h.hass)return;h.hass.callService('input_number','set_value',{entity_id:'input_number.garden_a_valve_{{ valve.slot }}_duration',value:0});})()"></span>{% for dv in [5,10,15,20] %}<span class="gws-dot{{ ' gws-don2' if dv==valve.duration else '' }}" onclick="(function(){var h=document.querySelector('home-assistant');if(!h||!h.hass)return;h.hass.callService('input_number','set_value',{entity_id:'input_number.garden_a_valve_{{ valve.slot }}_duration',value:{{ dv }}});})()"></span>{% endfor %}</div><span class="gws-dl">{{ 'Off' if valve.duration==0 else (valve.duration|string+' min') }}</span></div>{% endfor %} </div> <button class="gws-bgo{{ ' gws-bgo-dim' if winter else '' }}" onclick="(function(){var h=document.querySelector('home-assistant');if(!h||!h.hass||{{ 'true' if winter else 'false' }})return;h.hass.callService('input_boolean','turn_on',{entity_id:'input_boolean.garden_a_schedule_armed'});h.hass.callService('input_boolean','turn_off',{entity_id:'input_boolean.garden_rain_cancel'});})()">&#9654; Go</button> <hr class="gws-div"> <div class="gws-stat"> {% if seq_on %} <div class="gws-stl">Time remaining</div> <div class="gws-stv"><span class="gwscd">{{ rmm }}:{{ '0' if rss < 10 else '' }}{{ rss }}</span><img class="gwscdimg" src="x" style="display:none" onerror="var el=this.previousElementSibling;var t={{ end_ts }}*1000;this.onerror=null;if(window.gwsT_a)clearInterval(window.gwsT_a);var f=function(){var r=t-Date.now();if(r<0)r=0;var ts=Math.floor(r/1000);var m=Math.floor(ts/60);var s=ts-m*60;el.textContent=m+':'+(s<10?'0':'')+s;if(r<=0)clearInterval(window.gwsT_a);};f();window.gwsT_a=setInterval(f,1000);"></div> {% elif winter %} <div style="color:#185fa5;font-size:.8em">&#10052; All watering suspended. Tap &#10052; to re-enable in spring.</div> {% elif rain and armed %} <div class="gws-stl">Next run</div> <div class="gws-stv gws-skip">{{ next_run }}</div> <div class="gws-skipn">Skipped &#8212; {{ next_after }}</div> {% elif armed and any_day %} <div class="gws-stl">Next run</div> <div class="gws-stv">{{ next_run }}</div> <div class="gws-skipn">{{ countdown }}</div> {% elif armed %} <div class="gws-stl">Next run</div> <div class="gws-stv" style="color:var(--secondary-text-color)">No days selected</div> {% else %} <div style="color:var(--secondary-text-color);font-size:.8em">Press Go to arm the schedule</div> {% endif %} </div> {% if rain and armed %} <div class="gws-ntc gws-ntcr">&#127783; Rain forecast next 24h. Today&#39;s run skipped. Tap &#9654; Go to override.</div> {% endif %} </div>
